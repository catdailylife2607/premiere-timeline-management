			// --- OOP MOCK (Data Structure) ---
			class Asset {
				constructor(id, type, rawTime, desc, createdAt) {
					this.id = id;
					this.type = type;
					this.rawTime = rawTime;
					this.desc = desc;
					this.createdAt = createdAt || 0; // Epoch time cho sắp xếp

					this.normalized = this.parseTime(rawTime);
					this.displayTime = this.formatDisplayTime();
					this.sortValue = this.calculateSortValue();
					this.displayDate = this.formatCreationDate(this.createdAt);
				}

				parseTime(t) {
					let parts = t.split(':').map(Number);
					let h = 0,
						m = 0,
						s = 0,
						f = 0;
					if (parts.length === 2) {
						m = parts[0];
						s = parts[1];
					} else if (parts.length === 3) {
						h = parts[0];
						m = parts[1];
						s = parts[2];
					} else if (parts.length === 4) {
						h = parts[0];
						m = parts[1];
						s = parts[2];
						f = parts[3];
					}
					return [h, m, s, f];
				}

				formatDisplayTime() {
					const pad = (num) => num.toString().padStart(2, '0');
					let [h, m, s, f] = this.normalized;
					if (this.rawTime.split(':').length === 2 && h === 0)
						return `${pad(m)}:${pad(s)}`;
					else if (this.rawTime.split(':').length === 3)
						return `${pad(h)}:${pad(m)}:${pad(s)}`;
					return `${pad(h)}:${pad(m)}:${pad(s)}:${pad(f)}`;
				}

				calculateSortValue() {
					let [h, m, s, f] = this.normalized;
					return h * 3600 * 60 + m * 60 * 60 + s * 60 + f;
				}

				formatCreationDate(ts) {
					if (!ts || ts === 0) return '---';
					const d = new Date(ts);
					return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')} - ${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
				}

				getCopyString() {
					return `- ${this.displayTime}: ${this.desc}`;
				}

				{ t: 'Meme', time: '00:12:14:30', d: 'Cat feeling sus meme' },
				{ t: 'Meme', time: '00:12:20:44', d: 'Cat lying down meme' },

			// System State
			let memoryAssets = [];
			let myChart = null;

			// DOM Elements
			const listEl = document.getElementById('assetList');
			const searchInput = document.getElementById('searchInput');
			const filterSelect = document.getElementById('filterSelect');
			const addForm = document.getElementById('addForm');
			const countDisplay = document.getElementById('totalCountDisplay');
			const submitBtn = document.getElementById('submitBtn');
			const syncDot = document.getElementById('syncDot');
			const syncText = document.getElementById('syncText');

			// --- AUTHENTICATION & DATABASE INIT ---
			const initAuth = async () => {
				if (!auth) return;
				try {
					if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
						try {
							// Thử dùng token mặc định
							await signInWithCustomToken(auth, __initial_auth_token);
						} catch (customTokenError) {
							// Xảy ra khi Firebase Config của người dùng khác với token hệ thống
							console.warn(
								'Token hệ thống không khớp với Firebase cá nhân. Đang tự động chuyển sang Đăng nhập Ẩn danh...',
								customTokenError,
							);
							await signInAnonymously(auth);
						}
					} else {
						await signInAnonymously(auth);
					}
				} catch (err) {
					console.error('Chi tiết Lỗi Xác Thực Firebase:', err);
					showToast(
						`Lỗi xác thực: ${err.code || 'Bị chặn bởi trình duyệt. Hãy dùng Live Server!'}`,
						'bg-red-600',
					);
					updateSyncUI(false);
				}
			};

			const updateSyncUI = (isOnline) => {
				if (isOnline) {
					syncDot.className =
						'w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]';
					syncText.textContent = 'Cloud Sync: Đang bật';
					syncText.className = 'text-green-400';
					submitBtn.disabled = false;
				} else {
					syncDot.className = 'w-2 h-2 rounded-full bg-red-500';
					syncText.textContent = 'Mất kết nối';
					syncText.className = 'text-red-400';
					submitBtn.disabled = true;
				}
			};

			if (auth) {
				onAuthStateChanged(auth, async (user) => {
					currentUser = user;
					if (user) {
						updateSyncUI(true);
						// Schema tương đương MongoDB: Database -> Collection -> Document
						// Path strict rule: artifacts/{appId}/users/{userId}/assets
						const assetsCollectionRef = collection(
							db,
							'artifacts',
							appId,
							'users',
							user.uid,
							'assets',
						);

						try {
							// Nạp thêm các file mới từ initialData vào Database một cách thông minh (tránh trùng lặp)
							const snapshot = await getDocs(assetsCollectionRef);
							const existingSignatures = new Set();
							snapshot.forEach((docSnap) => {
								const data = docSnap.data();
								existingSignatures.add(`${data.type}_${data.rawTime}_${data.desc}`);
							});

							let newlyAdded = 0;
							let seedTime = Date.now(); // Tạo thời gian mốc
							for (const item of initialData) {
								const sig = `${item.t}_${item.time}_${item.d}`;
								if (!existingSignatures.has(sig)) {
									// Cộng dồn seedTime để giữ nguyên thứ tự ban đầu của File Word
									await addDoc(assetsCollectionRef, {
										type: item.t,
										rawTime: item.time,
										desc: item.d,
										createdAt: seedTime++,
									});
									newlyAdded++;
								}
							}

							if (newlyAdded > 0) {
								showToast(
									`Đã tự động nạp thêm ${newlyAdded} file mới vào DB!`,
									'bg-blue-600',
								);
							}

							// Bật bộ lắng nghe Real-time DB (Thay thế cấu trúc In-memory cũ)
							onSnapshot(
								assetsCollectionRef,
								(snap) => {
									memoryAssets = [];
									snap.forEach((docSnap) => {
										const data = docSnap.data();
										memoryAssets.push(
											new Asset(
												docSnap.id,
												data.type,
												data.rawTime,
												data.desc,
												data.createdAt,
											),
										);
									});

									updateUI();
								},
								(error) => {
									console.error('Lỗi đồng bộ:', error);
									showToast('Lỗi kết nối CSDL', 'bg-red-600');
									updateSyncUI(false);
								},
							);
						} catch (err) {
							console.error('Lỗi truy vấn DB:', err);
							showToast('Lỗi tải dữ liệu', 'bg-red-600');
						}
					} else {
						updateSyncUI(false);
					}
				});

				initAuth(); // Kích hoạt
			} else {
				updateSyncUI(false);
				showToast('Firebase Auth chưa sẵn sàng', 'bg-red-600');
			}

			// --- UI RENDER FUNCTIONS ---
			let activeSorts = [];
			const sortOptions = [
				{ key: 'type', label: 'Type' },
				{ key: 'desc', label: 'Tên (A-Z)' },
				{ key: 'sortValue', label: 'Timestamp' },
				{ key: 'createdAt', label: 'Ngày thêm' },
			];

			// Gắn hàm xử lý Sort ra Global để onclick từ HTML bắt được
			window.toggleSort = function (key) {
				const idx = activeSorts.findIndex((s) => s.key === key);
				if (idx >= 0) {
					if (activeSorts[idx].dir === 1)
						activeSorts[idx].dir = -1; // Thành Desc
					else activeSorts.splice(idx, 1); // Bỏ sort nếu bấm lần 3
				} else {
					activeSorts.push({ key, dir: 1 }); // Mặc định Asc khi mới thêm
				}
				updateUI();
			};

			window.clearSort = function () {
				activeSorts = [];
				updateUI();
			};

			function renderSortUI() {
				const container = document.getElementById('sortContainer');
				if (!container) return;

				let html = `<span class="text-slate-400 font-semibold mr-2 flex items-center gap-1">Bộ lọc Đa cấp (Multi-Sort):</span>`;

				sortOptions.forEach((opt) => {
					const activeIdx = activeSorts.findIndex((s) => s.key === opt.key);
					let btnClass = 'bg-slate-700 hover:bg-slate-600 text-slate-300';
					let icon = '↕';
					let badge = '';

					// Nếu đang Active
					if (activeIdx >= 0) {
						btnClass = 'bg-praccent text-white border-blue-400 font-medium';
						icon = activeSorts[activeIdx].dir === 1 ? '▲' : '▼';
						badge = `<span class="ml-1 bg-white text-blue-800 text-[10px] w-4 h-4 flex items-center justify-center rounded-full font-bold shadow-sm">${activeIdx + 1}</span>`;
					}

					html += `<button onclick="window.toggleSort('${opt.key}')" class="px-2 py-1 rounded border border-transparent ${btnClass} transition-colors flex items-center gap-1">
                    ${opt.label} <span class="text-[10px]">${icon}</span> ${badge}
                </button>`;
				});

				if (activeSorts.length > 0) {
					html += `<button onclick="window.clearSort()" class="ml-auto text-red-400 hover:text-red-300 px-2 py-1 rounded hover:bg-red-900/30 transition-colors flex items-center gap-1">✕ Hủy Sort</button>`;
				}
				container.innerHTML = html;
			}

			function renderList() {
				const searchTerm = searchInput.value.toLowerCase();
				const typeFilter = filterSelect.value;

				// 1. Lọc dữ liệu
				let filteredData = memoryAssets.filter((asset) => {
					const matchType = typeFilter === 'All' || asset.type === typeFilter;
					const matchSearch =
						asset.desc.toLowerCase().includes(searchTerm) ||
						asset.displayTime.includes(searchTerm);
					return matchType && matchSearch;
				});

				// 2. Chạy Thuật toán Multiple Sort
				if (activeSorts.length > 0) {
					filteredData.sort((a, b) => {
						for (let i = 0; i < activeSorts.length; i++) {
							const { key, dir } = activeSorts[i];
							let valA = a[key];
							let valB = b[key];

							if (typeof valA === 'string') {
								valA = valA.toLowerCase();
								valB = valB.toLowerCase();
							}

							if (valA < valB) return -1 * dir;
							if (valA > valB) return 1 * dir;
						}
						return 0; // Nếu bằng nhau toàn bộ thì giữ nguyên vị trí
					});
				} else {
					// Mặc định luôn sort theo vị trí Timeline (timestamp video)
					filteredData.sort((a, b) => a.sortValue - b.sortValue);
				}

				listEl.innerHTML = '';

				if (filteredData.length === 0) {
					listEl.innerHTML = `<div class="p-8 text-center text-slate-500 italic">Không tìm thấy Document nào trong cơ sở dữ liệu.</div>`;
				}

				filteredData.forEach((asset) => {
					const typeColor =
						asset.type === 'SFX'
							? 'bg-indigo-500/20 text-indigo-300 border-indigo-500/30'
							: 'bg-amber-500/20 text-amber-300 border-amber-500/30';

					const row = document.createElement('div');
					row.className =
						'group grid grid-cols-12 gap-4 items-center px-4 py-3 bg-slate-800/40 hover:bg-slate-700/60 border border-transparent hover:border-slate-600 rounded transition-all cursor-pointer';

					row.onclick = (e) => {
						if (!e.target.closest('.delete-btn')) {
							handleCopy(asset.getCopyString());
						}
					};

					row.innerHTML = `
                    <div class="col-span-2 text-center">
                        <span class="text-xs px-2 py-1 rounded border ${typeColor} font-bold shadow-sm">${asset.type}</span>
                    </div>
                    <div class="col-span-2 font-mono text-sm text-blue-200 group-hover:text-blue-100 transition-colors">
                        ${asset.displayTime}
                    </div>
                    <div class="col-span-4 text-sm text-slate-300 break-words whitespace-normal">
                        ${asset.desc}
                    </div>
                    <div class="col-span-2 text-[11px] text-slate-400 font-mono tracking-tighter">
                        ${asset.displayDate}
                    </div>
                    <div class="col-span-2 flex justify-end gap-2 opacity-50 group-hover:opacity-100 transition-opacity">
                        <button class="text-xs bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded text-white flex items-center gap-1 shadow">
                            <span>📋</span> Copy
                        </button>
                        <button class="delete-btn text-xs bg-red-900/50 hover:bg-red-600 px-2 py-1 rounded text-white transition-colors border border-red-800 hover:border-red-500" data-id="${asset.id}" title="Xóa khỏi Database">
                            ✕
                        </button>
                    </div>
                `;
					listEl.appendChild(row);
				});

				// Gắn sự kiện Delete cho các nút vừa tạo
				document.querySelectorAll('.delete-btn').forEach((btn) => {
					btn.onclick = async (e) => {
						e.stopPropagation();
						const docId = e.currentTarget.getAttribute('data-id');
						if (confirm('Bạn có chắc muốn xóa vĩnh viễn mục này khỏi Database?')) {
							if (!currentUser) return;
							try {
								// Xóa Document từ DB
								await deleteDoc(
									doc(
										db,
										'artifacts',
										appId,
										'users',
										currentUser.uid,
										'assets',
										docId,
									),
								);
								showToast('Đã xóa thành công khỏi Database', 'bg-red-600');
							} catch (err) {
								showToast('Lỗi khi xóa', 'bg-red-600');
								console.error(err);
							}
						}
					};
				});
			}

			function renderChart() {
				let sfx = 0,
					meme = 0;
				memoryAssets.forEach((a) => {
					if (a.type === 'SFX') sfx++;
					else meme++;
				});
				const total = sfx + meme;

				const ctx = document.getElementById('assetChart').getContext('2d');

				if (myChart) myChart.destroy();

				myChart = new Chart(ctx, {
					type: 'doughnut',
					data: {
						labels: ['SFX', 'Meme'],
						datasets: [
							{
								data: [sfx, meme],
								backgroundColor: ['#6366f1', '#f59e0b'],
								borderColor: ['#1e293b', '#1e293b'],
								borderWidth: 2,
								hoverOffset: 4,
							},
						],
					},
					options: {
						responsive: true,
						maintainAspectRatio: false,
						cutout: '70%',
						plugins: {
							legend: {
								position: 'bottom',
								labels: { color: '#cbd5e1', font: { size: 11 } },
							},
							tooltip: {
								callbacks: {
									label: function (c) {
										return ` ${c.label}: ${c.raw} files`;
									},
								},
							},
						},
					},
				});

				countDisplay.textContent = `Total Document: ${total}`;
			}

			function updateUI() {
				renderSortUI();
				renderList();
				renderChart();
			}

			// --- INTERACTION LOGIC ---
			searchInput.addEventListener('input', renderList);
			filterSelect.addEventListener('change', renderList);

			// Add New to DB
			addForm.addEventListener('submit', async (e) => {
				e.preventDefault();
				if (!currentUser) return;

				submitBtn.disabled = true;
				submitBtn.innerHTML = '⏳ Đang lưu...';

				const type = document.getElementById('inputType').value;
				const time = document.getElementById('inputTime').value;
				const desc = document.getElementById('inputDesc').value;

				try {
					// Thêm Document mới vào Collection (kèm theo Ngày tháng tạo createdAt)
					const assetsCollectionRef = collection(
						db,
						'artifacts',
						appId,
						'users',
						currentUser.uid,
						'assets',
					);
					await addDoc(assetsCollectionRef, {
						type: type,
						rawTime: time,
						desc: desc,
						createdAt: Date.now(),
					});

					showToast('Đã lưu dữ liệu lên Cloud Database!', 'bg-green-600');

					// Reset form
					document.getElementById('inputTime').value = '';
					document.getElementById('inputDesc').value = '';
					document.getElementById('inputTime').focus();
				} catch (err) {
					showToast('Lỗi lưu Database!', 'bg-red-600');
					console.error(err);
				} finally {
					submitBtn.disabled = false;
					submitBtn.innerHTML = '+ Thêm vào Database';
				}
			});

			// Copy to Clipboard Fallback
			function handleCopy(text) {
				if (navigator.clipboard && window.isSecureContext) {
					navigator.clipboard
						.writeText(text)
						.then(() => showToast(`Đã copy: ${text}`, 'bg-blue-600'));
				} else {
					let textArea = document.createElement('textarea');
					textArea.value = text;
					textArea.style.position = 'fixed';
					textArea.style.left = '-999999px';
					document.body.appendChild(textArea);
					textArea.focus();
					textArea.select();
					try {
						document.execCommand('copy');
						showToast(`Đã copy: ${text}`, 'bg-blue-600');
					} catch (err) {
						showToast('Lỗi Copy!', 'bg-red-600');
					}
					textArea.remove();
				}
			}

			// Toast Notification System
			function showToast(message, bgColorClass = 'bg-slate-700') {
				const container = document.getElementById('toastContainer');
				const toast = document.createElement('div');
				toast.className = `${bgColorClass} text-white px-4 py-2 rounded shadow-lg text-sm font-medium flex items-center gap-2 toast-animate`;
				toast.innerHTML = `<span>✓</span> ${message}`;
				container.appendChild(toast);
				setTimeout(() => {
					toast.style.opacity = '0';
					toast.style.transform = 'translateY(100%)';
					toast.style.transition = 'all 0.3s ease-in';
					setTimeout(() => toast.remove(), 300);
				}, 3000);
			}
		</script>
	</body>
