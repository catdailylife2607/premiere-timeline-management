<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Premiere Timeline Asset Manager - Cloudinary Sync</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
		<style>
			::-webkit-scrollbar {
				width: 8px;
			}
			::-webkit-scrollbar-track {
				background: #1e293b;
			}
			::-webkit-scrollbar-thumb {
				background: #475569;
				border-radius: 4px;
			}
			::-webkit-scrollbar-thumb:hover {
				background: #64748b;
			}

			.chart-container {
				position: relative;
				width: 100%;
				max-width: 300px;
				margin-left: auto;
				margin-right: auto;
				height: 200px;
				max-height: 250px;
			}

			@keyframes slideIn {
				from {
					transform: translateY(100%);
					opacity: 0;
				}
				to {
					transform: translateY(0);
					opacity: 1;
				}
			}
			.toast-animate {
				animation: slideIn 0.3s ease-out forwards;
			}

			@keyframes pulse {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0.5;
				}
			}
			.animate-pulse-fast {
				animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
			}
		</style>
		<script>
			tailwind.config = {
				theme: {
					extend: {
						colors: {
							prdark: '#0f172a',
							prpanel: '#1e293b',
							praccent: '#3b82f6',
							prtext: '#cbd5e1',
						},
						fontFamily: { mono: ['Consolas', 'Monaco', 'Courier New', 'monospace'] },
					},
				},
			};
		</script>
	</head>
	<body class="bg-prdark text-prtext font-sans h-screen overflow-hidden flex flex-col relative">
		<header
			class="bg-prpanel border-b border-slate-700 p-4 flex justify-between items-center shrink-0">
			<div class="flex items-center gap-3">
				<div>
					<h1 class="text-xl font-bold text-white tracking-wide">
						🎬 TIMELINE ASSET MANAGER
					</h1>
					<p class="text-xs text-slate-400">Project Premiere: Firestore + Cloudinary</p>
				</div>
				<div
					id="syncStatus"
					class="flex items-center gap-2 px-2 py-1 bg-slate-800 rounded-full border border-slate-600 text-xs">
					<div
						class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse-fast"
						id="syncDot"></div>
					<span id="syncText" class="text-slate-300">Đang kết nối DB...</span>
				</div>
			</div>
			<div
				class="text-sm font-mono bg-slate-800 px-3 py-1 rounded border border-slate-700"
				id="totalCountDisplay">
				Total Assets: 0
			</div>
		</header>

		<main class="flex-1 flex flex-col md:flex-row overflow-hidden p-4 gap-4">
			<aside class="w-full md:w-1/3 lg:w-1/4 flex flex-col gap-4 overflow-y-auto pr-1 pb-4">
				<section
					class="bg-prpanel rounded-lg border border-slate-700 p-4 shrink-0 shadow-lg">
					<h2
						class="text-sm font-semibold text-slate-300 mb-2 uppercase tracking-wider border-b border-slate-700 pb-2">
						📊 Thống kê DB
					</h2>
					<div class="chart-container">
						<canvas id="assetChart"></canvas>
					</div>
				</section>

				<section
					class="bg-prpanel rounded-lg border border-slate-700 p-4 shrink-0 shadow-lg">
					<h2
						id="formTitle"
						class="text-sm font-semibold text-slate-300 mb-2 uppercase tracking-wider border-b border-slate-700 pb-2">
						➕ Lưu lên Cloud
					</h2>
					<form id="addForm" class="flex flex-col gap-3 mt-3">
						<div>
							<label class="block text-xs text-slate-400 mb-1">Loại (Type)</label>
							<select
								id="inputType"
								class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm text-white focus:outline-none focus:border-praccent">
								<option value="SFX">SFX</option>
								<option value="Meme">Meme</option>
							</select>
						</div>
						<div>
							<label class="block text-xs text-slate-400 mb-1"
								>Bắt đầu (Timestamp)</label
							>
							<input
								type="text"
								id="inputTime"
								placeholder="VD: 01:15:01"
								required
								class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm text-white font-mono focus:outline-none focus:border-praccent" />
						</div>
						<div>
							<label class="block text-xs text-slate-400 mb-1"
								>Kết thúc (Không bắt buộc)</label
							>
							<input
								type="text"
								id="inputEndTime"
								placeholder="VD: 01:15:15"
								class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm text-white font-mono focus:outline-none focus:border-praccent" />
						</div>
						<div>
							<label class="block text-xs text-slate-400 mb-1"
								>Mô tả (Description)</label
							>
							<input
								type="text"
								id="inputDesc"
								placeholder="Tên âm thanh/meme..."
								required
								class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm text-white focus:outline-none focus:border-praccent" />
						</div>
						<div>
							<label class="block text-xs text-slate-400 mb-1"
								>File Âm thanh/Video (Sẽ up lên Cloudinary)</label
							>
							<input
								type="file"
								id="inputFile"
								accept="audio/*,video/*"
								class="w-full bg-slate-800 border border-slate-600 rounded p-1 text-sm text-slate-300 file:mr-4 file:py-1 file:px-3 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-praccent file:text-white hover:file:bg-blue-600 cursor-pointer" />
							<p id="editFileHint" class="text-[10px] text-emerald-400 mt-1 hidden">
								Đã có file đính kèm. Tải lên file mới để ghi đè thay thế.
							</p>
						</div>
						<div class="flex gap-2 mt-2">
							<button
								type="submit"
								id="submitBtn"
								disabled
								class="flex-1 bg-praccent hover:bg-blue-600 disabled:bg-slate-600 disabled:cursor-not-allowed text-white font-bold py-2 px-4 rounded transition-colors text-sm flex justify-center items-center gap-2">
								+ Thêm
							</button>
							<button
								type="button"
								id="cancelEditBtn"
								class="hidden bg-slate-600 hover:bg-slate-500 text-white font-bold py-2 px-4 rounded transition-colors text-sm">
								Hủy
							</button>
						</div>
					</form>
				</section>
			</aside>

			<section
				class="w-full md:w-2/3 lg:w-3/4 bg-prpanel rounded-lg border border-slate-700 flex flex-col overflow-hidden shadow-lg">
				<div
					class="p-4 border-b border-slate-700 flex flex-col sm:flex-row gap-3 bg-slate-800/50 shrink-0">
					<div class="flex-1 relative">
						<span
							class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"
							>🔍</span
						>
						<input
							type="text"
							id="searchInput"
							placeholder="Tìm kiếm dữ liệu trên Cloud..."
							class="w-full bg-slate-900 border border-slate-600 rounded py-2 pl-10 pr-3 text-sm text-white focus:outline-none focus:border-praccent transition-colors" />
					</div>
					<div class="w-full sm:w-48 shrink-0">
						<select
							id="filterSelect"
							class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-sm text-white focus:outline-none focus:border-praccent">
							<option value="All">Mọi thể loại</option>
							<option value="SFX">Chỉ SFX</option>
							<option value="Meme">Chỉ Meme</option>
						</select>
					</div>
					<div class="w-full sm:w-48 shrink-0">
						<select
							id="durationFilter"
							class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-sm text-white focus:outline-none focus:border-praccent">
							<option value="All">Mọi thời lượng</option>
							<option value="short">&lt; 5 giây</option>
							<option value="medium">5 - 15 giây</option>
							<option value="long">&gt; 15 giây</option>
							<option value="unknown">Chưa có độ dài</option>
						</select>
					</div>
				</div>

				<div
					class="px-4 py-2 bg-slate-800/80 border-b border-slate-700 flex items-center gap-2 text-xs shrink-0 flex-wrap"
					id="sortContainer"></div>

				<div
					class="grid grid-cols-12 gap-3 px-6 py-2 bg-slate-800 text-[11px] font-bold text-slate-400 uppercase tracking-wider shrink-0">
					<div class="col-span-1 text-center">Type</div>
					<div class="col-span-2">Bắt đầu</div>
					<div class="col-span-2">Thời lượng</div>
					<div class="col-span-3">Description</div>
					<div class="col-span-2">Ngày thêm</div>
					<div class="col-span-2 text-right">Hành động</div>
				</div>

				<div id="assetList" class="flex-1 overflow-y-auto p-2 space-y-1">
					<div
						class="flex justify-center items-center h-full text-slate-500 flex-col gap-2">
						<div
							class="w-6 h-6 border-2 border-slate-500 border-t-praccent rounded-full animate-spin"></div>
						<p>Đang tải dữ liệu từ Cloud Database...</p>
					</div>
				</div>
			</section>
		</main>

		<!-- VIDEO PLAYER MODAL -->
		<div
			id="videoModal"
			class="fixed inset-0 z-50 hidden bg-black/80 flex items-center justify-center p-4">
			<div
				class="relative bg-prpanel rounded-lg shadow-2xl border border-slate-700 p-2 max-w-4xl w-full">
				<button
					id="closeVideoBtn"
					class="absolute -top-4 -right-4 bg-red-600 hover:bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold shadow-lg border-2 border-slate-800 z-10 transition-colors">
					✕
				</button>
				<video id="videoPlayer" class="w-full rounded bg-black max-h-[80vh]" controls>
					Trình duyệt của bạn không hỗ trợ thẻ video.
				</video>
			</div>
		</div>

		<div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

		<script type="module">
			import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
			import {
				getAuth,
				signInWithCustomToken,
				signInAnonymously,
				onAuthStateChanged,
			} from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
			import {
				getFirestore,
				collection,
				addDoc,
				updateDoc,
				deleteDoc,
				doc,
				onSnapshot,
			} from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

			// ==========================================
			// 1. CẤU HÌNH FIREBASE FIRESTORE (Database Text)
			// ==========================================
			const firebaseConfig = {
				apiKey: 'AIzaSyCxXis-5gNCy18sBM2iTAw6T5IfbpcKi8o', // Điền lại API Key Firebase
				authDomain: 'premiere-timeline-manager.firebaseapp.com',
				projectId: 'premiere-timeline-manager',
				storageBucket: 'premiere-timeline-manager.firebasestorage.app',
				messagingSenderId: '652254716656',
				appId: '1:652254716656:web:dd5f1794a8fd72b9c49835',
			};

			// ==========================================
			// 2. CẤU HÌNH CLOUDINARY (Database Audio/Video)
			// ==========================================
			const cloudinaryConfig = {
				cloudName: 'dwuwomfrs', // Ví dụ: 'dx123abc'
				uploadPreset: 'my premiere project', // Ví dụ: 'my_preset'
			};

			const envConfig =
				typeof __firebase_config !== 'undefined'
					? JSON.parse(__firebase_config)
					: firebaseConfig;
			const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-premiere-project';

			let app, auth, db;
			try {
				app = initializeApp(envConfig);
				auth = getAuth(app);
				db = getFirestore(app);
			} catch (error) {
				console.error('Lỗi khởi tạo DB:', error);
			}

			let currentUser = null;
			let editingId = null;
			window.currentAudio = null;
			window.currentAudioUrl = null; // Biến phụ trợ lưu URL chuẩn để tránh lỗi string escape khi so sánh

			// Xử lý Modal Video
			const videoModal = document.getElementById('videoModal');
			const closeVideoBtn = document.getElementById('closeVideoBtn');
			const videoPlayer = document.getElementById('videoPlayer');

			closeVideoBtn.addEventListener('click', () => {
				videoModal.classList.add('hidden');
				videoPlayer.pause();
				videoPlayer.src = '';
			});

			class Asset {
				constructor(id, type, rawTime, desc, createdAt, rawEndTime = '', fileUrl = '') {
					this.id = id;
					this.type = type;
					this.rawTime = rawTime;
					this.rawEndTime = rawEndTime;
					this.desc = desc;
					this.createdAt = createdAt || 0;
					this.fileUrl = fileUrl;

					this.normalized = this.parseTime(rawTime);
					this.displayTime = this.formatDisplayTime();
					this.sortValue = this.calculateSortValue();
					this.displayDate = this.formatCreationDate(this.createdAt);
					this.durationSeconds = this.calculateDurationSeconds();
				}

				parseTime(t) {
					if (!t) return [0, 0, 0, 0];
					let parts = t.split(':').map(Number);
					let h = 0,
						m = 0,
						s = 0,
						f = 0;
					if (parts.length === 2) {
						m = parts[0];
						s = parts[1];
					} else if (parts.length === 3) {
						h = parts[0];
						m = parts[1];
						s = parts[2];
					} else if (parts.length === 4) {
						h = parts[0];
						m = parts[1];
						s = parts[2];
						f = parts[3];
					}
					return [h, m, s, f];
				}

				formatDisplayTime() {
					const pad = (num) => num.toString().padStart(2, '0');
					let [h, m, s, f] = this.normalized;
					if (this.rawTime.split(':').length === 2 && h === 0)
						return `${pad(m)}:${pad(s)}`;
					else if (this.rawTime.split(':').length === 3)
						return `${pad(h)}:${pad(m)}:${pad(s)}`;
					return `${pad(h)}:${pad(m)}:${pad(s)}:${pad(f)}`;
				}

				calculateSortValue() {
					let [h, m, s, f] = this.normalized;
					return h * 3600 * 60 + m * 60 * 60 + s * 60 + f;
				}

				calculateDurationSeconds() {
					if (!this.rawEndTime) return -1;
					let endNorm = this.parseTime(this.rawEndTime);
					let endFrames =
						endNorm[0] * 3600 * 60 +
						endNorm[1] * 60 * 60 +
						endNorm[2] * 60 +
						endNorm[3];
					let diff = endFrames - this.sortValue;
					if (diff < 0) return -1;
					return diff / 60;
				}

				getDurationString() {
					if (this.durationSeconds === -1) return '---';
					if (this.durationSeconds === 0) return '0s';

					let diff = Math.round(this.durationSeconds * 60);
					const pad = (num) => num.toString().padStart(2, '0');

					let f = diff % 60;
					diff = Math.floor(diff / 60);
					let s = diff % 60;
					diff = Math.floor(diff / 60);
					let m = diff % 60;
					diff = Math.floor(diff / 60);
					let h = diff;

					if (h > 0) return `${pad(h)}:${pad(m)}:${pad(s)}:${pad(f)}`;
					if (m > 0) return `${pad(m)}:${pad(s)}:${pad(f)}`;
					return `${pad(s)}:${pad(f)}`;
				}

				formatCreationDate(ts) {
					if (!ts || ts === 0) return '---';
					const d = new Date(ts);
					return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')} - ${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
				}

				getCopyString() {
					return `${this.displayTime}`;
				}
			}

			let memoryAssets = [];
			let myChart = null;

			const listEl = document.getElementById('assetList');
			const searchInput = document.getElementById('searchInput');
			const filterSelect = document.getElementById('filterSelect');
			const durationFilter = document.getElementById('durationFilter');
			const addForm = document.getElementById('addForm');
			const formTitle = document.getElementById('formTitle');
			const countDisplay = document.getElementById('totalCountDisplay');
			const submitBtn = document.getElementById('submitBtn');
			const cancelEditBtn = document.getElementById('cancelEditBtn');
			const syncDot = document.getElementById('syncDot');
			const syncText = document.getElementById('syncText');

			const initAuth = async () => {
				if (!auth) return;
				try {
					if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
						try {
							await signInWithCustomToken(auth, __initial_auth_token);
						} catch (customTokenError) {
							console.warn(
								'Token hệ thống không khớp. Đang tự động chuyển sang Đăng nhập Ẩn danh...',
							);
							await signInAnonymously(auth);
						}
					} else {
						await signInAnonymously(auth);
					}
				} catch (err) {
					console.error('Chi tiết Lỗi Xác Thực Firebase:', err);
					showToast(
						`Lỗi xác thực: Bị chặn bởi trình duyệt. Hãy dùng Live Server!`,
						'bg-red-600',
					);
					updateSyncUI(false);
				}
			};

			const updateSyncUI = (isOnline) => {
				if (isOnline) {
					syncDot.className =
						'w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]';
					syncText.textContent = 'Cloud Sync: Đang bật';
					syncText.className = 'text-green-400';
					submitBtn.disabled = false;
				} else {
					syncDot.className = 'w-2 h-2 rounded-full bg-red-500';
					syncText.textContent = 'Mất kết nối';
					syncText.className = 'text-red-400';
					submitBtn.disabled = true;
				}
			};

			if (auth) {
				onAuthStateChanged(auth, async (user) => {
					currentUser = user;
					if (user) {
						updateSyncUI(true);
						const assetsCollectionRef = collection(
							db,
							'artifacts',
							appId,
							'public',
							'data',
							'assets',
						);

						try {
							onSnapshot(
								assetsCollectionRef,
								(snap) => {
									memoryAssets = [];
									snap.forEach((docSnap) => {
										const data = docSnap.data();
										memoryAssets.push(
											new Asset(
												docSnap.id,
												data.type,
												data.rawTime,
												data.desc,
												data.createdAt,
												data.rawEndTime || '',
												data.fileUrl || '',
											),
										);
									});
									updateUI();
								},
								(error) => {
									console.error('Lỗi đồng bộ:', error);
									showToast('Lỗi kết nối CSDL', 'bg-red-600');
									updateSyncUI(false);
								},
							);
						} catch (err) {
							console.error('Lỗi truy vấn DB:', err);
							showToast('Lỗi tải dữ liệu', 'bg-red-600');
						}
					} else {
						updateSyncUI(false);
					}
				});

				initAuth();
			} else {
				updateSyncUI(false);
				showToast('Firebase Auth chưa sẵn sàng', 'bg-red-600');
			}

			let activeSorts = [];
			const sortOptions = [
				{ key: 'type', label: 'Type' },
				{ key: 'desc', label: 'Tên (A-Z)' },
				{ key: 'sortValue', label: 'Timestamp' },
				{ key: 'durationSeconds', label: 'Thời lượng' },
				{ key: 'createdAt', label: 'Ngày thêm' },
			];

			window.toggleSort = function (key) {
				const idx = activeSorts.findIndex((s) => s.key === key);
				if (idx >= 0) {
					if (activeSorts[idx].dir === 1) activeSorts[idx].dir = -1;
					else activeSorts.splice(idx, 1);
				} else {
					activeSorts.push({ key, dir: 1 });
				}
				updateUI();
			};

			window.clearSort = function () {
				activeSorts = [];
				updateUI();
			};

			function renderSortUI() {
				const container = document.getElementById('sortContainer');
				if (!container) return;

				let html = `<span class="text-slate-400 font-semibold mr-2 flex items-center gap-1">Bộ lọc Đa cấp (Multi-Sort):</span>`;

				sortOptions.forEach((opt) => {
					const activeIdx = activeSorts.findIndex((s) => s.key === opt.key);
					let btnClass = 'bg-slate-700 hover:bg-slate-600 text-slate-300';
					let icon = '↕';
					let badge = '';

					if (activeIdx >= 0) {
						btnClass = 'bg-praccent text-white border-blue-400 font-medium';
						icon = activeSorts[activeIdx].dir === 1 ? '▲' : '▼';
						badge = `<span class="ml-1 bg-white text-blue-800 text-[10px] w-4 h-4 flex items-center justify-center rounded-full font-bold shadow-sm">${activeIdx + 1}</span>`;
					}

					html += `<button onclick="window.toggleSort('${opt.key}')" class="px-2 py-1 rounded border border-transparent ${btnClass} transition-colors flex items-center gap-1">
                    ${opt.label} <span class="text-[10px]">${icon}</span> ${badge}
                </button>`;
				});

				if (activeSorts.length > 0) {
					html += `<button onclick="window.clearSort()" class="ml-auto text-red-400 hover:text-red-300 px-2 py-1 rounded hover:bg-red-900/30 transition-colors flex items-center gap-1">✕ Hủy Sort</button>`;
				}
				container.innerHTML = html;
			}

			function renderList() {
				const searchTerm = searchInput.value.toLowerCase();
				const typeFilter = filterSelect.value;
				const durFilter = durationFilter.value;

				let filteredData = memoryAssets.filter((asset) => {
					const matchType = typeFilter === 'All' || asset.type === typeFilter;
					const matchSearch =
						asset.desc.toLowerCase().includes(searchTerm) ||
						asset.displayTime.includes(searchTerm);

					let matchDuration = true;
					const sec = asset.durationSeconds;
					if (durFilter === 'short') matchDuration = sec >= 0 && sec < 5;
					else if (durFilter === 'medium') matchDuration = sec >= 5 && sec <= 15;
					else if (durFilter === 'long') matchDuration = sec > 15;
					else if (durFilter === 'unknown') matchDuration = sec === -1;

					return matchType && matchSearch && matchDuration;
				});

				if (activeSorts.length > 0) {
					filteredData.sort((a, b) => {
						for (let i = 0; i < activeSorts.length; i++) {
							const { key, dir } = activeSorts[i];
							let valA = a[key];
							let valB = b[key];

							if (typeof valA === 'string') {
								valA = valA.toLowerCase();
								valB = valB.toLowerCase();
							}

							if (valA < valB) return -1 * dir;
							if (valA > valB) return 1 * dir;
						}
						return 0;
					});
				} else {
					filteredData.sort((a, b) => a.sortValue - b.sortValue);
				}

				listEl.innerHTML = '';

				if (filteredData.length === 0) {
					listEl.innerHTML = `<div class="p-8 text-center text-slate-500 italic">Không tìm thấy Document nào khớp với bộ lọc.</div>`;
				}

				filteredData.forEach((asset) => {
					const typeColor =
						asset.type === 'SFX'
							? 'bg-indigo-500/20 text-indigo-300 border-indigo-500/30'
							: 'bg-amber-500/20 text-amber-300 border-amber-500/30';
					const isEditing = asset.id === editingId;
					const rowBg = isEditing
						? 'bg-blue-900/40 border-blue-500/50'
						: 'bg-slate-800/40 border-transparent hover:bg-slate-700/60 hover:border-slate-600';

					const row = document.createElement('div');
					row.className = `group grid grid-cols-12 gap-3 items-center px-4 py-3 border rounded transition-all cursor-pointer ${rowBg}`;

					row.onclick = (e) => {
						if (!e.target.closest('button')) {
							handleCopy(asset.getCopyString());
						}
					};

					let durationDisplay = asset.getDurationString();
					let durationHTML =
						durationDisplay === '---'
							? `<span class="text-slate-500">---</span>`
							: `<span class="text-fuchsia-300 bg-fuchsia-900/30 px-1 rounded border border-fuchsia-800/50 flex items-center gap-1 w-max"><span class="text-[9px]">⏱️</span>${durationDisplay}</span>`;

					let playBtnHTML = '';
					if (asset.fileUrl) {
						// SỬA LỖI 1: Ép kiểu boolean để lưu giá trị HTML data-video="true/false" chuẩn xác
						const isVideoFile =
							Boolean(asset.fileUrl.match(/\.(mp4|webm|mov|mkv)$/i)) ||
							asset.type === 'Meme';
						const playIcon = isVideoFile ? '🎬 Xem' : '▶ Phát';

						playBtnHTML = `<button class="play-btn text-xs bg-emerald-900/60 hover:bg-emerald-600 px-2 py-1 rounded text-white transition-colors shadow border border-emerald-700/50" data-url="${asset.fileUrl}" data-video="${isVideoFile}" title="Nghe thử/Xem thử">${playIcon}</button>`;
					}

					row.innerHTML = `
						<div class="col-span-1 text-center">
							<span class="text-[10px] px-1.5 py-0.5 rounded border ${typeColor} font-bold shadow-sm">${asset.type}</span>
						</div>
						<div class="col-span-2 font-mono text-sm text-blue-200 group-hover:text-blue-100 transition-colors">
							${asset.displayTime}
						</div>
						<div class="col-span-2 font-mono text-xs">
							${durationHTML}
						</div>
						<div class="col-span-3 text-sm text-slate-300 break-words whitespace-normal">
							${asset.desc}
						</div>
						<div class="col-span-2 text-[11px] text-slate-400 font-mono tracking-tighter">
							${asset.displayDate}
						</div>
						<div class="col-span-2 flex justify-end gap-1 opacity-50 group-hover:opacity-100 transition-opacity">
							${playBtnHTML}
							<button class="edit-btn text-xs bg-blue-900/60 hover:bg-blue-600 px-2 py-1 rounded text-white transition-colors shadow border border-blue-700/50" data-id="${asset.id}" title="Chỉnh sửa">
								✏️
							</button>
							<button class="delete-btn text-xs bg-red-900/50 hover:bg-red-600 px-2 py-1 rounded text-white transition-colors border border-red-800 hover:border-red-500" data-id="${asset.id}" title="Xóa khỏi Database">
								✕
							</button>
						</div>
					`;
					listEl.appendChild(row);
				});

				document.querySelectorAll('.delete-btn').forEach((btn) => {
					btn.onclick = async (e) => {
						e.stopPropagation();
						const docId = e.currentTarget.getAttribute('data-id');

						if (docId === editingId) {
							showToast('Không thể xóa mục đang được chỉnh sửa', 'bg-amber-600');
							return;
						}

						if (
							confirm(
								'Bạn có chắc muốn xóa vĩnh viễn mục này khỏi Database? (Lưu ý: File media trên Cloudinary cần được xóa thủ công trên bảng điều khiển Cloudinary)',
							)
						) {
							if (!currentUser) return;
							try {
								await deleteDoc(
									doc(db, 'artifacts', appId, 'public', 'data', 'assets', docId),
								);
								showToast('Đã xóa thành công khỏi Database', 'bg-red-600');
							} catch (err) {
								showToast('Lỗi khi xóa', 'bg-red-600');
								console.error(err);
							}
						}
					};
				});

				document.querySelectorAll('.edit-btn').forEach((btn) => {
					btn.onclick = (e) => {
						e.stopPropagation();
						const docId = e.currentTarget.getAttribute('data-id');
						const assetToEdit = memoryAssets.find((a) => a.id === docId);

						if (assetToEdit) {
							editingId = docId;

							document.getElementById('inputType').value = assetToEdit.type;
							document.getElementById('inputTime').value = assetToEdit.rawTime;
							document.getElementById('inputEndTime').value =
								assetToEdit.rawEndTime || '';
							document.getElementById('inputDesc').value = assetToEdit.desc;

							if (assetToEdit.fileUrl) {
								document.getElementById('editFileHint').classList.remove('hidden');
							} else {
								document.getElementById('editFileHint').classList.add('hidden');
							}

							formTitle.innerHTML = '✏️ Chỉnh sửa Asset';
							formTitle.classList.replace('text-slate-300', 'text-green-400');

							submitBtn.innerHTML = '💾 Cập nhật';
							submitBtn.classList.replace('bg-praccent', 'bg-green-600');
							submitBtn.classList.replace('hover:bg-blue-600', 'hover:bg-green-500');

							cancelEditBtn.classList.remove('hidden');

							updateUI();
							document
								.getElementById('addForm')
								.scrollIntoView({ behavior: 'smooth' });
						}
					};
				});

				document.querySelectorAll('.play-btn').forEach((btn) => {
					btn.onclick = (e) => {
						e.stopPropagation();
						// SỬA LỖI 2: Lưu thẳng biến btnElement để dùng nội bộ, tránh việc nó bị gỡ mất (null) sau khi tải xong sự kiện
						const btnElement = e.currentTarget;
						const url = btnElement.getAttribute('data-url');
						const isVideo = btnElement.getAttribute('data-video') === 'true';

						if (isVideo) {
							if (window.currentAudio) {
								window.currentAudio.pause();
								document
									.querySelectorAll('.play-btn[data-video="false"]')
									.forEach((b) => {
										b.innerHTML = '▶ Phát';
										b.classList.replace('bg-rose-600', 'bg-emerald-900/60');
									});
							}
							videoPlayer.src = url;
							videoModal.classList.remove('hidden');
							videoPlayer.play();
							return;
						}

						if (window.currentAudio) {
							// Check xem có phải bấm vào chính bài đang phát không
							// Đã sửa so sánh bằng biến window.currentAudioUrl thay vì src để tránh lỗi mã hóa %20
							if (window.currentAudioUrl === url && !window.currentAudio.paused) {
								window.currentAudio.pause();
								btnElement.innerHTML = '▶ Phát';
								btnElement.classList.replace('bg-rose-600', 'bg-emerald-900/60');
								return;
							}

							window.currentAudio.pause();
							document
								.querySelectorAll('.play-btn[data-video="false"]')
								.forEach((b) => {
									b.innerHTML = '▶ Phát';
									b.classList.replace('bg-rose-600', 'bg-emerald-900/60');
								});
						}

						window.currentAudioUrl = url;
						window.currentAudio = new Audio(url);
						window.currentAudio.play();
						btnElement.innerHTML = '⏸ Dừng';
						btnElement.classList.replace('bg-emerald-900/60', 'bg-rose-600');

						window.currentAudio.onended = () => {
							btnElement.innerHTML = '▶ Phát';
							btnElement.classList.replace('bg-rose-600', 'bg-emerald-900/60');
						};
					};
				});
			}

			function renderChart() {
				let sfx = 0,
					meme = 0;
				memoryAssets.forEach((a) => {
					if (a.type === 'SFX') sfx++;
					else meme++;
				});
				const total = sfx + meme;

				const ctx = document.getElementById('assetChart').getContext('2d');

				if (myChart) myChart.destroy();

				myChart = new Chart(ctx, {
					type: 'doughnut',
					data: {
						labels: ['SFX', 'Meme'],
						datasets: [
							{
								data: [sfx, meme],
								backgroundColor: ['#6366f1', '#f59e0b'],
								borderColor: ['#1e293b', '#1e293b'],
								borderWidth: 2,
								hoverOffset: 4,
							},
						],
					},
					options: {
						responsive: true,
						maintainAspectRatio: false,
						cutout: '70%',
						plugins: {
							legend: {
								position: 'bottom',
								labels: { color: '#cbd5e1', font: { size: 11 } },
							},
							tooltip: {
								callbacks: {
									label: function (c) {
										return ` ${c.label}: ${c.raw} files`;
									},
								},
							},
						},
					},
				});

				countDisplay.textContent = `Total Document: ${total}`;
			}

			function updateUI() {
				renderSortUI();
				renderList();
				renderChart();
			}

			function resetForm() {
				editingId = null;
				addForm.reset();

				document.getElementById('inputFile').value = '';
				document.getElementById('editFileHint').classList.add('hidden');

				formTitle.innerHTML = '➕ Lưu lên Cloud';
				formTitle.classList.replace('text-green-400', 'text-slate-300');

				submitBtn.disabled = false;
				submitBtn.innerHTML = '+ Thêm';
				submitBtn.classList.replace('bg-green-600', 'bg-praccent');
				submitBtn.classList.replace('hover:bg-green-500', 'hover:bg-blue-600');

				cancelEditBtn.classList.add('hidden');
				updateUI();
			}

			searchInput.addEventListener('input', renderList);
			filterSelect.addEventListener('change', renderList);
			durationFilter.addEventListener('change', renderList);
			cancelEditBtn.addEventListener('click', resetForm);

			addForm.addEventListener('submit', async (e) => {
				e.preventDefault();
				if (!currentUser) return;

				submitBtn.disabled = true;
				submitBtn.innerHTML = '⏳ Đang khởi tạo...';

				const type = document.getElementById('inputType').value;
				const time = document.getElementById('inputTime').value;
				const endTime = document.getElementById('inputEndTime').value;
				const desc = document.getElementById('inputDesc').value;
				const fileInput = document.getElementById('inputFile');
				const file = fileInput.files[0];

				let currentFileUrl = '';
				if (editingId) {
					const editingAsset = memoryAssets.find((a) => a.id === editingId);
					if (editingAsset) currentFileUrl = editingAsset.fileUrl;
				}

				try {
					// NẾU CÓ FILE: Tải lên Cloudinary thông qua XMLHttpRequest để theo dõi %
					if (file) {
						if (
							!cloudinaryConfig.cloudName ||
							!cloudinaryConfig.uploadPreset ||
							cloudinaryConfig.cloudName.includes('ĐIỀN')
						) {
							throw new Error('Bạn chưa thiết lập cấu hình Cloudinary ở dòng 301!');
						}

						const formData = new FormData();
						formData.append('file', file);
						formData.append('upload_preset', cloudinaryConfig.uploadPreset);

						await new Promise((resolve, reject) => {
							const xhr = new XMLHttpRequest();
							// Endpoint cho auto (tự nhận diện âm thanh hay video)
							xhr.open(
								'POST',
								`https://api.cloudinary.com/v1_1/${cloudinaryConfig.cloudName}/auto/upload`,
							);

							xhr.upload.onprogress = (e) => {
								if (e.lengthComputable) {
									const progress = (e.loaded / e.total) * 100;
									submitBtn.innerHTML = `⏳ Đang đẩy lên Cloudinary (${Math.round(progress)}%)...`;
								}
							};

							xhr.onload = () => {
								if (xhr.status === 200) {
									const response = JSON.parse(xhr.responseText);
									currentFileUrl = response.secure_url; // Lấy URL an toàn
									resolve();
								} else {
									reject(new Error(`Upload failed: ${xhr.responseText}`));
								}
							};

							xhr.onerror = () =>
								reject(new Error('Lỗi mạng khi tải lên Cloudinary'));
							xhr.send(formData);
						});

						submitBtn.innerHTML = '⏳ Đang lưu DB...';
					}

					// Lưu thông tin văn bản và URL (Cloudinary) vào Firestore
					if (editingId) {
						const docRef = doc(
							db,
							'artifacts',
							appId,
							'public',
							'data',
							'assets',
							editingId,
						);
						await updateDoc(docRef, {
							type: type,
							rawTime: time,
							rawEndTime: endTime,
							desc: desc,
							fileUrl: currentFileUrl,
						});
						showToast('Đã cập nhật thay đổi!', 'bg-green-600');
					} else {
						const assetsCollectionRef = collection(
							db,
							'artifacts',
							appId,
							'public',
							'data',
							'assets',
						);
						await addDoc(assetsCollectionRef, {
							type: type,
							rawTime: time,
							rawEndTime: endTime,
							desc: desc,
							fileUrl: currentFileUrl,
							createdAt: Date.now(),
						});
						showToast('Đã thêm dữ liệu và File đính kèm lên DB!', 'bg-green-600');
					}
					resetForm();
					document.getElementById('inputTime').focus();
				} catch (err) {
					showToast(err.message || 'Lỗi tải file / lưu DB!', 'bg-red-600');
					console.error(err);
					submitBtn.disabled = false;
					submitBtn.innerHTML = editingId ? '💾 Cập nhật' : '+ Thêm';
				}
			});

			function handleCopy(text) {
				if (navigator.clipboard && window.isSecureContext) {
					navigator.clipboard
						.writeText(text)
						.then(() => showToast(`Đã copy: ${text}`, 'bg-blue-600'));
				} else {
					let textArea = document.createElement('textarea');
					textArea.value = text;
					textArea.style.position = 'fixed';
					textArea.style.left = '-999999px';
					document.body.appendChild(textArea);
					textArea.focus();
					textArea.select();
					try {
						document.execCommand('copy');
						showToast(`Đã copy: ${text}`, 'bg-blue-600');
					} catch (err) {
						showToast('Lỗi Copy!', 'bg-red-600');
					}
					textArea.remove();
				}
			}

			function showToast(message, bgColorClass = 'bg-slate-700') {
				const container = document.getElementById('toastContainer');
				const toast = document.createElement('div');
				toast.className = `${bgColorClass} text-white px-4 py-2 rounded shadow-lg text-sm font-medium flex items-center gap-2 toast-animate`;
				toast.innerHTML = `<span>✓</span> ${message}`;
				container.appendChild(toast);
				setTimeout(() => {
					toast.style.opacity = '0';
					toast.style.transform = 'translateY(100%)';
					toast.style.transition = 'all 0.3s ease-in';
					setTimeout(() => toast.remove(), 300);
				}, 3000);
			}
		</script>
	</body>
</html>
